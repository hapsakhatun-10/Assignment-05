<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- tailwind css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white w-[420px] rounded-xl shadow-lg p-8">

        <!-- Logo -->
        <div class="flex justify-center mb-4">
            <img src="assets/github-logo.png" alt="">
        </div>

        <h2 class="text-center text-2xl font-semibold text-gray-800">
            GitHub Issues Tracker
        </h2>
        <p class="text-center text-gray-500 text-sm mb-6">
            Sign in to manage your issues
        </p>
        <label class="text-sm text-gray-600">Username</label>
        <input type="text" id="userId" placeholder="Enter Username"
            class="w-full border mt-1 mb-1 p-2 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500">

        <p class="text-xs text-teal-600 mb-4">
            Default: admin
        </p>
        <!-- Password -->
        <label class="text-sm text-gray-600">Password</label>
        <input type="password" id="userPass" placeholder="Enter Password"
            class="w-full border mt-1 mb-1 p-2 rounded-md ">

        <p class="text-xs text-teal-600 mb-4">
            Default: admin123
        </p>

        <!-- Button -->
        <button class="w-full bg-[#4A00FF] text-white py-2 rounded-md font-medium hover:opacity-90" onclick="login()">
            Sign In
        </button>
        <!-- Divider -->
        <div class="flex items-center my-6">
            <div class="flex-1 border-t"></div>
            <span class="px-3 text-gray-400 text-sm">OR</span>
            <div class="flex-1 border-t"></div>
        </div>

        <!-- Demo -->
        <div class="bg-gray-100 p-4 rounded-md text-center text-sm text-gray-700">
            <p class="font-semibold">Demo Credentials:</p>
            <p>Username: <span class="font-medium">admin</span></p>
            <p>Password: <span class="font-medium">admin123</span></p>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
