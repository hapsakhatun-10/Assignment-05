<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <nav class="flex justify-between items-center p-4 shadow-md">
        <div class="flex items-center gap-2 font-bold text-xl">
            <img src="assets/github-logo.png" alt="Logo" class="w-10 h-10">
            GitHub Issues Tracker
        </div>
        <div class="flex gap-2">
            <input type="text" placeholder="Search..." id="searchInput"
                class="input input-bordered border border-black">
            <button class="btn px-4 text-white font-bold bg-[#4a00FF]" id="searchBtn">Search</button>
        </div>
    </nav>


    <!-- Tabs -->

    <section
        class="mx-auto w-11/12 px-4 py-6 md:w-4/5 h-16 flex justify-start items-center border rounded-lg shadow-md mx-auto gap-2 sm:gap-4 mt-4">
        <button id="allBtn" data-tab="all" onclick="loadTab('allBtn')"
            class="btn allBtn px-12 border bg-[#4A00FF] text-white rounded hover:opacity-90 transition">
            All
        </button>
        <button id="openBtn" data-tab="open" onclick="loadTab('openBtn')"
            class="btn allBtn px-12  bg-white text-black border rounded hover:opacity-90 transition">
            Open
        </button>
        <button id="closeBtn" data-tab="closed" onclick="loadTab('closeBtn')"
            class="btn allBtn px-12  bg-white text-black border rounded hover:opacity-90 transition">
            Closed
        </button>
    </section>

    <!-- Issue Tracker -->
    <section class="mx-auto w-11/12 md:w-4/5 mt-4 p-4 border rounded-lg shadow-md bg-white">

        <div class="flex justify-between">
            <div class="flex gap-3">
                <img src="assets/Aperture.png" class="h-10 rounded-full bg-gray-300" alt="">
                <div>
                    <h2 id="issueCount" class="text-2xl font-semibold">0 Issues</h2>
                    <p class="text-gray-500 text-l">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-3">
                <div class="flex items-center gap-2">
                    <div class="w-4 h-4 bg-pink-500 rounded-full"></div>
                    <span>Open</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-4 h-4 bg-purple-500 rounded-full"></div>
                    <span>Closed</span>
                </div>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="hidden text-center my-4">
            <span class="loading loading-spinner loading-lg"></span>
        </div>



        <!-- Issue Cards Container -->
        <div id="allContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mt-4"></div>
        <div id="openContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mt-4"></div>
        <div id="closedContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mt-4"></div>
        <!-- Popover -->
        <p id="popoverLabel" class="text-sm mt-2"></p>

        <!-- Cart -->
        <div id="issueCart" class="fixed inset-0 bg-black/50 hidden flex justify-center items-center">
            <div class="bg-white rounded-lg w-11/12 md:w-96 p-6 relative">

                <!-- popover-card -->
                <div id="popover-card">
                    <button onclick="closeCart()" class="btn px-4 text-white font-bold bg-red-500 mt-2">Close</button>
                </div>
            </div>

            <!-- Link External JS -->
            <script src="script.js"></script>
        </div>
    </section>
</body>

</html>
