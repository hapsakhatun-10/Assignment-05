<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet">
</head>

<body class="bg-gray-50">

    <!-- Navbar -->
    <nav class="flex flex-col sm:flex-row justify-between items-center p-4 shadow-md gap-2 sm:gap-0 bg-white">
        <div class="flex items-center gap-2 font-bold text-xl">
            <img src="assets/github-logo.png" alt="Logo" class="w-10 h-10">
            GitHub Issues Tracker
        </div>
        <div class="flex gap-2 w-full sm:w-auto">
            <input type="text" placeholder="Search..." id="searchInput"
                class="input input-bordered border border-black flex-1">
            <button class="btn px-4 text-white font-bold bg-[#4a00FF] flex-shrink-0" id="searchBtn">Search</button>
        </div>
    </nav>

    <!-- Tabs -->
    <section class="flex flex-col md:flex-row gap-4 mt-4 mx-4 md:mx-auto md:w-4/5">
        <div class="flex flex-col md:flex-row gap-2 md:gap-4 w-full md:w-auto">
            <button id="allBtn" class="tab-btn border btn bg-[#4A00FF] text-white rounded px-4 py-2" data-tab="all"
                onclick="loadTab('allBtn')">All</button>
            <button id="openBtn" class="tab-btn btn bg-white text-black border rounded px-4 py-2" data-tab="open"
                onclick="loadTab('openBtn')">Open</button>
            <button id="closeBtn" class="tab-btn btn bg-white text-black border rounded px-4 py-2" data-tab="closed"
                onclick="loadTab('closeBtn')">Closed</button>
        </div>
    </section>

    <!-- Issue Tracker -->
    <section class="mx-4 md:mx-auto md:w-4/5 mt-4 p-4 border rounded-lg shadow-md bg-white">

        <!-- Header -->
        <div class="flex flex-col sm:flex-row justify-between gap-4 sm:gap-0">
            <div class="flex gap-3 items-center">
                <img src="assets/Aperture.png" class="h-10 rounded-full bg-gray-300" alt="">
                <div>
                    <h2 id="issueCount" class="text-2xl font-semibold">0 Issues</h2>
                    <p class="text-gray-500 text-sm sm:text-l">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-3 items-center">
                <div class="flex items-center gap-2">
                    <div class="w-4 h-4 bg-pink-500 rounded-full"></div>
                    <span>Open</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-4 h-4 bg-purple-500 rounded-full"></div>
                    <span>Closed</span>
                </div>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="hidden text-center my-4">
            <span class="loading loading-spinner loading-lg"></span>
        </div>

        <!-- Issue Cards Container -->
        <div id="allContainer" class="grid grid-cols-1 sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mt-4"></div>
        <div id="openContainer" class="grid grid-cols-1 sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mt-4 hidden">
        </div>
        <div id="closedContainer"
            class="grid grid-cols-1 sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mt-4 hidden"></div>

        <!-- Popover -->
        <p id="popoverLabel" class="text-sm mt-2"></p>

        <!-- Cart / Modal -->
        <div id="issueCart" class="fixed inset-0 bg-black/50 hidden flex justify-center items-center p-4">
            <div class="bg-white rounded-lg w-full max-w-md p-6 relative">
                <!-- popover-card -->
                <div id="popover-card">
                    <button onclick="closeCart()"
                        class="btn px-4 py-2 text-white font-bold bg-red-500 w-full mt-2 rounded">Close</button>
                </div>
            </div>
        </div>

        <!-- External JS -->
        <script src="script.js"></script>

    </section>

</body>

</html>
